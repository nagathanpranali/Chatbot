<html>
<head>
    <title> Profile Chatbot 🤖 </title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins', sans-serif;
        }

        body{
            background: linear-gradient(135deg, #1f1c2c, #928dab);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(12px);
            width:600px;
            padding:30px;
            border-radius:20px;
            box-shadow:0 20px 40px rgba(0,0,0,0.3);
            text-align:center;
            border:1px solid rgba(255,255,255,0.2);
        }

        h1{
            margin-bottom:20px;
            font-size:28px;
            font-weight:700;
            color:#e6e6ff;
        }

        textarea{
            width:100%;
            height:220px;
            resize:none;
            padding:15px;
            font-size:15px;
            border-radius:15px;
            border:none;
            outline:none;
            background: rgba(255,255,255,0.15);
            color:#ffffff;
            text-align:left;
            overflow-y:auto;
        }

        input[type="text"]{
            width:70%;
            padding:12px;
            margin-top:15px;
            border-radius:25px;
            border:none;
            outline:none;
            font-size:15px;
            background: rgba(255,255,255,0.9);
        }

        /* ✅ Same white background, softer font color */
        input[type="submit"]{
            padding:12px 20px;
            margin-left:10px;
            border:none;
            border-radius:25px;
            background:#ffffff;
            color:#5f5c7b;   /* softened text color */
            font-size:15px;
            cursor:pointer;
            transition:0.3s;
            font-weight:600;
        }

        input[type="submit"]:hover{
            transform:scale(1.05);
            opacity:0.9;
        }

        h2{
            margin-top:20px;
            font-size:16px;
            color:#ffd369;
            font-weight:500;
        }
    </style>

    <script>
        function sb()
        {
            let chatbox = document.getElementById("chatbox");
            chatbox.scrollTop = chatbox.scrollHeight;
        }
    </script>

</head>

<body onload="sb()">
    <div class="container">
        <h1> Profile Chatbot 🤖 </h1>

        <form method="POST">
            <textarea name="chat" id="chatbox" readonly>{{chat}}</textarea>
            <br>
            <input type="text" name="qts" placeholder="Ask me anything..." required/>
            <input type="submit" value="Send"/>
        </form>

        <h2>{{ msg }}</h2>
    </div>
</body>
</html>
